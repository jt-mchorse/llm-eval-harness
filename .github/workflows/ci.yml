name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .

  test:
    # Issue #7 acceptance criterion: tested on macOS and ubuntu-latest.
    # Python matrix kept so the CLI typing stays compatible across the
    # versions consumers run.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e '.[dev]'
      - run: pytest --cov=eval_harness --cov-report=term
      # Smoke-test the CLI itself is callable and the four public
      # subcommands surface in --help — matches the "CLI installed as
      # console_script" + "complete --help" acceptance criteria.
      - name: CLI smoke
        run: |
          eval-harness --help
          eval-harness run --help
          eval-harness list --help
          eval-harness calibrate --help
          eval-harness diff --help

  memory-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Verify MEMORY directory exists and has required files
        run: |
          test -f MEMORY/full_history_ai.md
          test -f MEMORY/full_history_human.md
          test -f MEMORY/core_decisions_ai.md
          test -f MEMORY/core_decisions_human.md
      - name: Verify D-001 baseline decision exists
        run: |
          grep -q "id: D-001" MEMORY/core_decisions_ai.md
